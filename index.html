
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Exercício A-Frame - Aula 1</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>



    <a-scene>
      
<a-assets>
  <img id="pano" src="2019_07_05_Armazones_Inside_Crater_Pano_24mm_EQ-CC.jpg">
</a-assets>

<a-sky src="#pano" rotation="0 -90 0"></a-sky>

      <!-- Plano de chão -->
      <a-plane position="0 0 0" rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>

      <!-- Objectos geométricos -->
      <a-box position="-3 1 -4" rotation="0 45 0" color="#4CC3D9"></a-box>
      <a-sphere position="0 1.25 -5" radius="1.25" color="#EF2D5E"></a-sphere>
      <a-cylinder position="3 1 -3" radius="0.5" height="2" color="#FFC65D"></a-cylinder>

      <!-- Câmara com controlos padrão -->
      <a-camera wasd-controls look-controls position="0 1.6 5"></a-camera>
    </a-scene>
  </body>
</html>
